<!DOCTYPE html>
<html>
<head>
    <title>Shabbos Times</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css" crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" href="shabbos.css">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://kit.fontawesome.com/0a7f654060.js" crossorigin="anonymous"></script>
</head>
<body onload="changeColor()">

<nav class="navbar navbar-expand-lg navbar-dark app-nav">
    <a class="navbar-brand" href="index.html" id="colorlabel2">Shabbos Times</a>

    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent">
        <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <ul class="navbar-nav mr-auto">
            <li class="nav-item active">
                <a class="nav-link" href="index.html">Shabbos Times</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="../dailydaf/">Daily Daf</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="../tehillim/">Tehillim</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="../sefira/">Sefirat HaOmer</a>
            </li>
        </ul>
    </div>
</nav>

<main class="app-shell">
<section class="hero-card">
<h1 class="header" id="header">Shabbos times for your area</h1>

<div class="finder">
    <input type="number" id="zip" placeholder="Zip Code" autofocus>
    <input type="date" id="futureDate">
    <button class="btn" id="submit" onclick="find()">Find Times</button>
</div>
</section>

<section id="page" class="info-grid">
    <article class="info-card candles">
        <p class="card-label">Candle Lighting</p>
        <p id="candleLighting" class="value-text">—</p>
    </article>

    <article class="info-card parsha">
        <p id="parshalabel" class="value-text">
            Torah portion:<br>
            <span id="parsha">—</span>
            <i class="fa-regular fa-rectangle-list fa-2xs" onclick="generateAI()"></i>
        </p>
    </article>

    <article class="info-card havdala">
        <p class="card-label">Havdalah</p>
        <p id="havdala" class="value-text">—</p>
    </article>
</section>
</main>

<script src="shabbos.js"></script>
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js"></script>
</body>
</html>
