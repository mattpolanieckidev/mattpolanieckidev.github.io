<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0f172a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Road to 100</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:linear-gradient(160deg,#0f172a,#1e293b);color:#f1f5f9;min-height:100vh;padding:env(safe-area-inset-top) 16px env(safe-area-inset-bottom);display:flex;flex-direction:column}
header{padding:20px 0 12px;text-align:center}
h1{font-size:22px;font-weight:700;letter-spacing:-.3px}
h1 span{color:#38bdf8}
main{flex:1;max-width:500px;width:100%;margin:0 auto;padding-bottom:20px}
.card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:20px;margin-bottom:14px}
.muted{color:#94a3b8;font-size:13px}
button{font:inherit;border:none;border-radius:12px;padding:14px 20px;font-weight:600;cursor:pointer;width:100%;transition:transform .1s}
button:active{transform:scale(.97)}
.primary{background:#38bdf8;color:#0f172a;font-size:17px}
.secondary{background:rgba(255,255,255,.1);color:#f1f5f9}
.ghost{background:transparent;color:#94a3b8;padding:8px}
.nav{display:flex;gap:6px;background:rgba(255,255,255,.05);padding:4px;border-radius:14px;margin-bottom:14px}
.nav button{flex:1;background:transparent;color:#94a3b8;padding:10px;font-size:15px}
.nav button.on{background:#38bdf8;color:#0f172a}
.big{font-size:72px;font-weight:800;text-align:center;line-height:1;margin:12px 0;color:#38bdf8}
.timer{font-size:56px;font-weight:700;text-align:center;color:#fbbf24;font-variant-numeric:tabular-nums}
.label{text-transform:uppercase;font-size:11px;letter-spacing:1.5px;color:#94a3b8;text-align:center;margin-bottom:4px}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:10px}
.cal div{aspect-ratio:1;border-radius:8px;background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;font-size:11px;color:#64748b}
.cal div.p{background:#38bdf8;color:#0f172a;font-weight:700}
.cal div.s{background:#f472b6;color:#0f172a;font-weight:700}
.cal div.both{background:linear-gradient(135deg,#38bdf8 50%,#f472b6 50%);color:#0f172a;font-weight:700}
.sets{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin:14px 0}
.sets span{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600}
.sets span.cur{background:#38bdf8;color:#0f172a;transform:scale(1.15)}
.sets span.done{background:#22c55e;color:#fff}
.legend{display:flex;gap:14px;justify-content:center;margin-top:10px;font-size:12px;color:#94a3b8}
.legend i{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:5px;vertical-align:middle}
.stack>*+*{margin-top:10px}
</style>
</head>
<body>
<header><h1>Road to <span>100</span></h1></header>
<main id="app"></main>
<script>
const PROGRAM={
  pushups:[[4,4,3,3,5],[5,5,4,4,6],[8,8,5,5,10],[10,10,7,7,12],[12,12,10,10,15],[15,15,12,12,20],[18,18,14,14,25],[20,20,16,16,100]],
  situps: [[5,5,4,4,6],[6,6,5,5,8],[10,10,6,6,12],[12,12,8,8,15],[14,14,12,12,18],[17,17,14,14,22],[20,20,16,16,28],[22,22,18,18,100]]
};
const REST=[60,60,60,60,60,60,60,90];
const LABELS={pushups:"Push-ups",situps:"Sit-ups"};
const K="road100";
const defState=()=>({current:"pushups",pushups:{week:0,day:0},situps:{week:0,day:0},history:{},active:null});
let state=JSON.parse(localStorage.getItem(K)||"null")||defState();
if(!state.pushups||!state.situps)state=defState();
const save=()=>localStorage.setItem(K,JSON.stringify(state));
const app=document.getElementById("app");
const today=()=>new Date().toISOString().slice(0,10);

function render(){if(state.active)return workout();home()}

function home(){
  const type=state.current,prog=state[type],wk=prog.week,dy=prog.day;
  const done=wk>=8;
  const sets=done?null:PROGRAM[type][wk];
  const total=sets?sets.reduce((a,b)=>a+b,0):0;
  const last=sets?sets[sets.length-1]:0;
  let cal='';
  for(let i=27;i>=0;i--){
    const d=new Date();d.setDate(d.getDate()-i);
    const k=d.toISOString().slice(0,10);
    const h=state.history[k]||{};
    let cls=h.pushups&&h.situps?'both':h.pushups?'p':h.situps?'s':'';
    cal+=`<div class="${cls}">${d.getDate()}</div>`;
  }
  const totalDone=Object.keys(state.history).length;
  app.innerHTML=`
  <div class="nav">
    <button class="${type==='pushups'?'on':''}" onclick="switchType('pushups')">💪 Push-ups</button>
    <button class="${type==='situps'?'on':''}" onclick="switchType('situps')">🔥 Sit-ups</button>
  </div>
  <div class="card">
    <div class="label">${LABELS[type]} · Week ${Math.min(wk+1,8)} · Day ${dy+1}/3</div>
    ${done?`<div class="big">🏆</div><p style="text-align:center" class="muted">Program complete!</p>`:
    `<div class="big">${total}</div><p style="text-align:center" class="muted">reps today across ${sets.length} sets${last>=50?' · final set is MAX':''}</p>
    <div class="sets">${sets.map(n=>`<span>${n}</span>`).join('')}</div>
    <button class="primary" onclick="start()">Start workout</button>`}
  </div>
  <div class="card">
    <div class="label">Activity · ${totalDone} days logged</div>
    <div class="cal">${cal}</div>
    <div class="legend"><div><i style="background:#38bdf8"></i>Push-ups</div><div><i style="background:#f472b6"></i>Sit-ups</div><div><i style="background:linear-gradient(135deg,#38bdf8 50%,#f472b6 50%)"></i>Both</div></div>
  </div>
  <div class="card"><button class="secondary" onclick="resetOne()">Reset ${LABELS[type]} progress</button></div>`;
}
window.switchType=t=>{state.current=t;save();render()};
window.resetOne=()=>{const t=state.current;if(confirm(`Reset ${LABELS[t]} progress?`)){state[t]={week:0,day:0};save();render()}};
window.start=()=>{state.active={type:state.current,set:0,phase:'work',secs:0};save();render()};

function workout(){
  const a=state.active,sets=PROGRAM[a.type][state[a.type].week];
  const cur=sets[a.set],isLast=a.set===sets.length-1;
  const dots=sets.map((n,i)=>`<span class="${i<a.set?'done':i===a.set?'cur':''}">${n}</span>`).join('');
  if(a.phase==='work'){
    app.innerHTML=`<div class="card">
      <div class="label">${LABELS[a.type]} · Set ${a.set+1} of ${sets.length}${isLast&&cur>=50?' · MAX OUT':''}</div>
      <div class="big">${cur}</div>
      <p style="text-align:center" class="muted">${isLast&&cur>=50?'Do as many as you can':'reps'}</p>
      <div class="sets">${dots}</div>
      <button class="primary" onclick="doneSet()">Done ✓</button>
      <button class="ghost" onclick="quit()">Quit workout</button>
    </div>`;
  }else{
    app.innerHTML=`<div class="card">
      <div class="label">Rest · next: ${sets[a.set+1]||'—'} reps</div>
      <div class="timer" id="tm">${a.secs}</div>
      <p style="text-align:center" class="muted">seconds remaining</p>
      <div class="sets">${dots}</div>
      <div class="stack"><button class="secondary" onclick="skipRest()">Skip rest</button><button class="ghost" onclick="addTime(15)">+15s</button></div>
    </div>`;
  }
}

let tick=null;
window.doneSet=()=>{const a=state.active,sets=PROGRAM[a.type][state[a.type].week];if(a.set>=sets.length-1)return finish();a.phase='rest';a.secs=REST[state[a.type].week];save();render();startTick()};
window.skipRest=()=>{stopTick();state.active.set++;state.active.phase='work';save();render()};
window.addTime=n=>{state.active.secs+=n;save();const el=document.getElementById('tm');if(el)el.textContent=state.active.secs};
window.quit=()=>{if(confirm('Quit this workout?')){stopTick();state.active=null;save();render()}};

function startTick(){stopTick();tick=setInterval(()=>{state.active.secs--;const el=document.getElementById('tm');if(el)el.textContent=state.active.secs;if(state.active.secs<=0){stopTick();if(navigator.vibrate)navigator.vibrate([200,100,200]);state.active.set++;state.active.phase='work';save();render()}},1000)}
function stopTick(){if(tick){clearInterval(tick);tick=null}}

function finish(){
  stopTick();
  const a=state.active,d=today();
  if(!state.history[d])state.history[d]={};
  state.history[d][a.type]=state[a.type].week+1;
  state[a.type].day++;
  if(state[a.type].day>=3){state[a.type].day=0;state[a.type].week++}
  state.active=null;save();
  app.innerHTML=`<div class="card"><div class="big">🎉</div><h2 style="text-align:center;margin-bottom:8px">${LABELS[a.type]} done!</h2><p class="muted" style="text-align:center;margin-bottom:16px">Rest at least a day before the next ${LABELS[a.type].toLowerCase()} session.</p><button class="primary" onclick="render()">Back to home</button></div>`;
}

render();
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
</body>
</html>
